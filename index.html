<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cie Yang 18 Tahun Duluan</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#ff6eb4;--yellow:#ffe066;--mint:#5ee7c0;
  --lavender:#c9a8ff;--orange:#ff9a5c;--sky:#62d4ff;--red:#ff5e7a;
}
body{
  min-height:100vh;background:#fff0f5;
  font-family:'Nunito',sans-serif;
  overflow:hidden;position:relative;cursor:default;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(255,110,180,.13) 2px,transparent 2px);
  background-size:28px 28px;
}
.rainbow-bar{
  position:fixed;top:0;left:0;right:0;height:7px;z-index:999;
  background:linear-gradient(90deg,#ff5e7a,#ff9a5c,#ffe066,#5ee7c0,#62d4ff,#c9a8ff,#ff6eb4);
}
.scene-title{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.3rem,3.5vw,2rem);
  letter-spacing:.08em;z-index:50;
  background:linear-gradient(135deg,#ff5e7a,#ff9a5c,#ffe066,#5ee7c0,#62d4ff,#c9a8ff);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rainbow 3s linear infinite;
  filter:drop-shadow(0 3px 0 rgba(255,110,180,.3));
  white-space:nowrap;pointer-events:none;
}
@keyframes rainbow{0%{background-position:0% center}100%{background-position:300% center}}
.hint{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font-family:'Bubblegum Sans',cursive;
  font-size:.88rem;color:rgba(200,80,140,.7);
  letter-spacing:.06em;z-index:999;pointer-events:none;
  animation:blink 2.5s ease-in-out infinite;white-space:nowrap;
  background:rgba(255,255,255,.75);
  padding:5px 18px;border-radius:20px;
  box-shadow:0 2px 10px rgba(255,110,180,.15);
}
@keyframes blink{0%,100%{opacity:.6}50%{opacity:1}}

#giftWrap{
  position:fixed;z-index:30;cursor:grab;
  user-select:none;-webkit-user-select:none;
  transform:translate(-50%,-50%);
}
#giftWrap:active{cursor:grabbing;}
@keyframes wobbleDrop{
  0%  {transform:rotate(0deg) scale(1)}
  20% {transform:rotate(-5deg) scale(1.06)}
  45% {transform:rotate(4deg)  scale(.97)}
  65% {transform:rotate(-2deg) scale(1.02)}
  100%{transform:rotate(0deg) scale(1)}
}
#giftWrap.wobble .gift-inner{ animation:wobbleDrop .5s ease; }
.gift-box{
  width:150px;height:110px;position:relative;
  background:linear-gradient(135deg,#ff6eb4 0%,#ff9a5c 50%,#ffe066 100%);
  border-radius:8px;
  box-shadow:0 8px 0 rgba(0,0,0,.08),0 12px 30px rgba(255,110,180,.35),inset 0 1px 0 rgba(255,255,255,.3);
  overflow:hidden;
}
.gift-box::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle 4px,rgba(255,255,255,.22) 100%,transparent 100%);
  background-size:22px 22px;background-position:11px 11px;
}
.gift-box::after{
  content:'';position:absolute;top:0;bottom:0;left:50%;
  width:22px;transform:translateX(-50%);
  background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,.15));
  box-shadow:inset 0 0 6px rgba(255,255,255,.2);
}
.gift-box-shadow{
  position:absolute;bottom:-6px;left:6px;right:6px;height:8px;
  background:rgba(200,80,120,.25);filter:blur(6px);border-radius:50%;
}
.gift-lid{
  width:164px;height:44px;margin-left:-7px;position:relative;
  background:linear-gradient(135deg,#c9a8ff 0%,#ff6eb4 55%,#ff9a5c 100%);
  border-radius:8px;
  box-shadow:0 4px 0 rgba(0,0,0,.1),0 6px 20px rgba(200,100,255,.3),inset 0 1px 0 rgba(255,255,255,.35);
  z-index:4;overflow:hidden;margin-bottom:0;
  transform-origin:bottom center;
  transform:rotateX(0deg);
  transition:transform .65s cubic-bezier(.23,1,.32,1);
}
.gift-lid::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle 3px,rgba(255,255,255,.2) 100%,transparent 100%);
  background-size:18px 18px;background-position:9px 9px;
}
.gift-lid::after{
  content:'';position:absolute;left:0;right:0;top:50%;height:18px;
  transform:translateY(-50%);
  background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.1));
}
.gift-lid-vrib{
  position:absolute;top:0;bottom:0;left:50%;width:20px;
  transform:translateX(-50%);
  background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.1));
  z-index:5;pointer-events:none;
}
.gift-bow{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  width:50px;height:28px;z-index:6;pointer-events:none;
}
.bow-left,.bow-right{
  position:absolute;top:6px;width:22px;height:20px;
  border-radius:50%;box-shadow:inset 0 0 6px rgba(0,0,0,.15);
}
.bow-left{left:0;background:linear-gradient(135deg,#ffe066,#ff9a5c);transform:rotate(-30deg);transform-origin:right center;}
.bow-right{right:0;background:linear-gradient(135deg,#ffe066,#ff9a5c);transform:rotate(30deg);transform-origin:left center;}
.bow-center{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff7 0%,#ffb347 100%);
  box-shadow:0 2px 4px rgba(0,0,0,.2);z-index:7;
}
.gift-inner{position:relative;width:150px;perspective:600px;perspective-origin:50% 100%;}
#giftWrap.open .gift-lid{transform:rotateX(-130deg);}
@keyframes giftShake{
  0%,100%{transform:rotate(0deg)}20%{transform:rotate(-3deg)}
  40%{transform:rotate(3deg)}60%{transform:rotate(-2deg)}80%{transform:rotate(2deg)}
}
#giftWrap:not(.open):not(.dragging) .gift-inner:hover{animation:giftShake .5s ease;}
.sparkle{
  position:fixed;pointer-events:none;z-index:100;font-size:1.4rem;
  animation:sparkleOut .8s ease forwards;
}
@keyframes sparkleOut{
  0%  {opacity:1;transform:translate(0,0) scale(0.5)}
  60% {opacity:1;transform:translate(var(--sx),var(--sy)) scale(1.2)}
  100%{opacity:0;transform:translate(var(--sx2),var(--sy2)) scale(0.3)}
}
.gift-label{
  position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);
  font-family:'Bubblegum Sans',cursive;font-size:.78rem;color:rgba(200,80,140,.75);
  letter-spacing:.06em;white-space:nowrap;background:rgba(255,255,255,.7);
  padding:3px 14px;border-radius:20px;box-shadow:0 2px 8px rgba(255,110,180,.12);
  transition:opacity .3s;pointer-events:none;
}

#bookWrap{
  position:fixed;z-index:40;cursor:grab;
  user-select:none;-webkit-user-select:none;
  transform:translate(-50%,-50%);display:none;
}
#bookWrap.visible{display:block;}
#bookWrap:active{cursor:grabbing;}
#bookWrap.popping .book-container{animation:none!important;}
@keyframes bookWobble{
  0%  {transform:rotate(0deg) scale(1)}25%{transform:rotate(-4deg) scale(1.05)}
  50% {transform:rotate(3deg) scale(.97)}75%{transform:rotate(-2deg) scale(1.02)}
  100%{transform:rotate(0deg) scale(1)}
}
#bookWrap.wobble .book-container{animation:bookWobble .5s ease!important;}

.scene{perspective:900px;perspective-origin:50% 50%;}
.book-container{
  width:210px;height:290px;position:relative;
  transform-style:preserve-3d;
  animation:float 5s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:rotateX(0deg) rotateY(0deg) translateY(0)}
  50%    {transform:rotateX(0deg) rotateY(0deg) translateY(-14px)}
}

.face{position:absolute;top:50%;left:50%;}

.face-front{
  width:210px;height:290px;margin-left:-105px;margin-top:-145px;
  transform:translateZ(23px);
  background:linear-gradient(145deg,#ff6eb4 0%,#ff9a5c 25%,#ffe066 50%,#5ee7c0 75%,#62d4ff 100%);
  border-radius:0;overflow:hidden;
  box-shadow:inset -5px 0 15px rgba(0,0,0,.15),inset 3px 0 8px rgba(255,255,255,.2);
}
.face-front::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,rgba(255,255,255,.35) 0%,transparent 50%);
}
.face-front::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(255,255,255,.08) 8px,rgba(255,255,255,.08) 16px);
}

.face-back{
  width:210px;height:290px;margin-left:-105px;margin-top:-145px;
  transform:rotateY(180deg) translateZ(23px);
  background:linear-gradient(160deg,#c9a8ff,#ff6eb4);border-radius:0;
}

.face-spine{
  width:46px;height:290px;margin-left:-23px;margin-top:-145px;
  transform:rotateY(-90deg) translateZ(105px);
  background:linear-gradient(180deg,#ff5e7a 0%,#ff9a5c 25%,#ffe066 50%,#5ee7c0 75%,#c9a8ff 100%);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.face-spine::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.1),rgba(255,255,255,.12),rgba(0,0,0,.1));
}
.spine-text{
  font-family:'Fredoka One',cursive;color:#fff;font-size:.55rem;letter-spacing:.22em;
  writing-mode:vertical-rl;transform:rotate(180deg);
  text-shadow:0 1px 3px rgba(0,0,0,.25);position:relative;z-index:1;
}

.face-pages{
  width:46px;height:290px;margin-left:-23px;margin-top:-145px;
  transform:rotateY(90deg) translateZ(105px);
  background:linear-gradient(90deg,#e8e0d0,#f5efe0 30%,#faf5ec 50%,#f5efe0 70%,#e8e0d0);
  overflow:hidden;
}
.face-pages::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 2.5px);
}

.face-top{
  width:210px;
  height:46px;
  margin-left:-105px;
  margin-top:-23px;
  transform:rotateX(90deg) translateZ(145px);
  background:linear-gradient(180deg, #f0e8d8 0%, #e4daca 60%, #cfc7b8 100%);
  overflow:hidden;
}
.face-top::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,
    transparent 0px,transparent 2px,
    rgba(180,160,120,.18) 2px,rgba(180,160,120,.18) 2.5px);
}
.face-top::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(255,255,255,.3) 0%,
    transparent 40%,
    rgba(0,0,0,.1) 100%);
}

.face-bottom{
  width:210px;
  height:46px;
  margin-left:-105px;
  margin-top:-23px;
  transform:rotateX(-90deg) translateZ(145px);
  background:linear-gradient(0deg, #bfb8ac 0%, #cec7ba 60%, #ddd5c5 100%);
  overflow:hidden;
}
.face-bottom::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,
    transparent 0px,transparent 2px,
    rgba(150,130,100,.2) 2px,rgba(150,130,100,.2) 2.5px);
}

.cover-stars{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.star{position:absolute;font-size:1rem;animation:starSpin 4s linear infinite;opacity:.7;}
@keyframes starSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
.cover-deco-border{position:absolute;inset:8px;border:3px dashed rgba(255,255,255,.5);border-radius:8px;pointer-events:none;z-index:3;}
.cover-emoji{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-60%);font-size:3.2rem;z-index:4;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));
  animation:bounceCover 2s ease-in-out infinite;
}
@keyframes bounceCover{0%,100%{transform:translate(-50%,-60%) translateY(0)}50%{transform:translate(-50%,-60%) translateY(-8px)}}
.cover-title{
  position:absolute;bottom:55px;left:0;right:0;text-align:center;
  font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;line-height:1.3;
  text-shadow:0 2px 0 rgba(0,0,0,.2);padding:0 12px;z-index:4;
}
.cover-sub{
  position:absolute;bottom:38px;left:0;right:0;text-align:center;
  font-family:'Bubblegum Sans',cursive;font-size:.58rem;color:rgba(255,255,255,.85);letter-spacing:.12em;text-transform:uppercase;z-index:4;
}
.cover-author{
  position:absolute;bottom:16px;left:0;right:0;text-align:center;
  font-family:'Nunito',sans-serif;font-weight:600;font-size:.52rem;color:rgba(255,255,255,.65);letter-spacing:.1em;text-transform:uppercase;z-index:4;
}

.bookmark{
  position:absolute;top:-10px;width:18px;z-index:5;
  filter:drop-shadow(1px 3px 4px rgba(0,0,0,.25));
  animation:bmFloat 3s ease-in-out infinite;
}
.bookmark-love{ right:36px; animation-delay:0s; }
.bookmark-star{ right:14px; animation-delay:.9s; }
@keyframes bmFloat{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-4px); }
}
.book-shadow{
  position:absolute;width:300px;height:35px;
  bottom:-50px;left:50%;transform:translateX(-50%);
  background:radial-gradient(ellipse,rgba(255,110,180,.4) 0%,transparent 72%);
  filter:blur(16px);pointer-events:none;
}

.modal-overlay{
  position:fixed;inset:0;
  background:rgba(255,240,245,.94);backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-inner{position:relative;display:flex;flex-direction:column;align-items:center}
.book-header{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:12px;}
.book-title-bar{
  font-family:'Fredoka One',cursive;font-size:1rem;
  background:linear-gradient(90deg,#ff5e7a,#ff9a5c,#5ee7c0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.close-btn{
  background:linear-gradient(135deg,#ff6eb4,#ff9a5c);border:none;
  color:#fff;font-size:.7rem;padding:6px 16px;border-radius:20px;cursor:pointer;
  font-family:'Fredoka One',cursive;letter-spacing:.1em;
  transition:all .2s;box-shadow:0 3px 10px rgba(255,110,180,.4);
}
.close-btn:hover{transform:scale(1.05);}
.open-book-row{display:flex;align-items:center;gap:0}
.nav-btn{
  background:linear-gradient(135deg,#c9a8ff,#ff6eb4);border:none;
  color:#fff;font-size:1.5rem;width:40px;height:40px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;margin:0 10px;
  box-shadow:0 3px 12px rgba(200,100,255,.35);font-family:'Fredoka One',cursive;
}
.nav-btn:hover{transform:scale(1.12) rotate(-5deg);}
.nav-btn:disabled{opacity:.25;cursor:default;pointer-events:none;transform:none}
.open-book{
  display:flex;width:min(720px,90vw);height:min(480px,75vh);
  box-shadow:0 30px 80px rgba(255,110,180,.3),0 0 0 3px rgba(255,110,180,.2);
  border-radius:6px;
  transform:scale(.82) translateY(25px);
  transition:transform .5s cubic-bezier(.23,1,.32,1);
}
.modal-overlay.open .open-book{transform:scale(1) translateY(0)}
.page-left,.page-right{flex:1;padding:clamp(20px,4vw,36px) clamp(18px,3.5vw,32px);position:relative;overflow:hidden;}
.page-left{
  background:linear-gradient(108deg,#fffaf5 0%,#fff5ee 100%);
  border-radius:6px 0 0 6px;
  border-right:1px solid rgba(255,160,180,.25);
  box-shadow:inset -8px 0 22px rgba(255,160,180,.08),3px 0 8px rgba(0,0,0,.06);
}
.page-right{
  background:linear-gradient(72deg,#fff5ee 0%,#fffaf5 100%);
  border-radius:0 6px 6px 0;
  box-shadow:inset 8px 0 22px rgba(255,160,180,.08);
}
.page-left::before,.page-right::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(255,160,180,.1) 26px,rgba(255,160,180,.1) 27px);
}
.binding{
  width:22px;flex-shrink:0;
  background:linear-gradient(90deg,#ff9a5c,#ff6eb4 35%,#c9a8ff 50%,#ff6eb4 65%,#ff9a5c);
  box-shadow:0 0 20px rgba(255,110,180,.5);
}
.page-num{
  position:absolute;bottom:14px;
  font-family:'Bubblegum Sans',cursive;font-size:.72rem;
  color:rgba(255,110,180,.5);letter-spacing:.1em;
}
.page-left .page-num{left:clamp(14px,3.5vw,28px)}
.page-right .page-num{right:clamp(14px,3.5vw,28px)}
.page-indicator{margin-top:14px;display:flex;gap:7px;align-items:center;}
.pip{width:8px;height:8px;border-radius:50%;background:rgba(255,110,180,.25);transition:all .3s;cursor:pointer;}
.pip.active{background:var(--pink);transform:scale(1.4);box-shadow:0 0 6px rgba(255,110,180,.6);}
.page-content{animation:flipIn .35s ease}

@keyframes flipIn{from{opacity:0;transform:perspective(600px) rotateY(-10deg) scale(.95)}to{opacity:1;transform:perspective(600px) rotateY(0) scale(1)}}


.ch-label{display:inline-block;font-family:'Bubblegum Sans',cursive;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;padding:2px 10px;border-radius:20px;background:linear-gradient(135deg,#ffcce5,#ffe5b4);color:#c05080;}
.pg-heading{font-family:'Fredoka One',cursive;font-size:clamp(1rem,2.5vw,1.35rem);background:linear-gradient(135deg,#ff5e7a,#ff9a5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.35rem;line-height:1.3;}
.pg-divider{width:60px;height:3px;background:linear-gradient(90deg,#ff6eb4,#ffe066,#5ee7c0);border-radius:3px;margin:8px 0 14px;}
.pg-text{font-family:'Nunito',sans-serif;font-size:clamp(.82rem,1.5vw,.88rem);color:#4a2030;line-height:1.9;text-align:justify;}
.pg-text p+p{text-indent:1.1em}
.drop{float:left;font-family:'Fredoka One',cursive;font-size:3rem;line-height:.75;padding-right:6px;padding-top:4px;background:linear-gradient(135deg,#ff6eb4,#ff9a5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.orn{text-align:center;font-size:1.1rem;margin:10px 0;letter-spacing:.4em}
.pg-quote{border-left:4px solid transparent;border-image:linear-gradient(180deg,#ff6eb4,#c9a8ff) 1;margin:12px 0;padding:6px 14px;font-style:italic;font-size:.84rem;color:#7a3050;background:linear-gradient(90deg,rgba(255,200,220,.15),transparent);border-radius:0 6px 6px 0;}
.pg-poem{font-family:'Nunito',sans-serif;font-style:italic;font-weight:600;font-size:.83rem;color:#8a3060;line-height:2.1;text-align:center;margin:10px 0;padding:10px;background:linear-gradient(135deg,rgba(255,200,220,.2),rgba(200,200,255,.2));border-radius:12px;}

.particle{position:fixed;pointer-events:none;z-index:1;animation:pdrift linear infinite;}
@keyframes pdrift{0%{transform:translateY(-5vh) translateX(0) rotate(0deg);opacity:0}8%{opacity:1}90%{opacity:.8}100%{transform:translateY(108vh) translateX(var(--dx)) rotate(var(--rot));opacity:0}}
.balloon{position:fixed;pointer-events:none;z-index:1;font-size:var(--bsize);animation:balloonRise linear infinite;}
@keyframes balloonRise{0%{transform:translateY(110vh) translateX(0);opacity:0}5%{opacity:1}50%{transform:translateY(40vh) translateX(var(--sway))}95%{opacity:.9}100%{transform:translateY(-15vh) translateX(0);opacity:0}}
.bunting-wrap{position:fixed;top:5px;left:0;right:0;z-index:40;pointer-events:none;overflow:hidden;height:60px;}
.bunting-svg{width:100%;height:60px;}
.float-star{position:fixed;pointer-events:none;z-index:2;font-size:var(--sz);animation:floatStar var(--dur) ease-in-out infinite;opacity:.5;}
@keyframes floatStar{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(180deg)}}
</style>
</head>
<body>

<div class="rainbow-bar"></div>
<div id="particles"></div>
<p class="scene-title">🎂 Happy Birthday! 🎂</p>

<div id="giftWrap">
  <div class="gift-inner">
    <div class="gift-lid">
      <div class="gift-lid-vrib"></div>
      <div class="gift-bow">
        <div class="bow-left"></div>
        <div class="bow-right"></div>
        <div class="bow-center"></div>
      </div>
    </div>
    <div class="gift-box">
      <div class="gift-box-shadow"></div>
    </div>
    <div class="gift-label" id="giftLabel">🎁 Buka?</div>
  </div>
</div>

<div id="bookWrap">
  <div class="scene">
    <div class="book-container" id="bookEl">

<script>
function makeDraggable(el, opts){
  const state = { x:0, y:0, active:false, sx:0, sy:0, ex:0, ey:0, moved:false };
  el.style.transform = 'translate(-50%,-50%)';
  function setPos(x,y){
    const hw = opts.clampW||100, hh = opts.clampH||100;
    x = Math.max(hw, Math.min(window.innerWidth  - hw, x));
    y = Math.max(hh, Math.min(window.innerHeight - hh, y));
    state.x = x; state.y = y;
    el.style.left = x+'px'; el.style.top  = y+'px';
  }
  function startDrag(mx,my){
    state.active=true; state.moved=false;
    state.sx=mx; state.sy=my; state.ex=state.x; state.ey=state.y;
    el.style.transition='none';
  }
  function moveDrag(mx,my){
    if(!state.active) return;
    const dx=mx-state.sx, dy=my-state.sy;
    if(Math.abs(dx)>4||Math.abs(dy)>4) state.moved=true;
    setPos(state.ex+dx, state.ey+dy);
  }
  function endDrag(){
    if(!state.active) return;
    state.active=false;
    if(!state.moved && opts.onTap) opts.onTap();
  }
  el.addEventListener('mousedown', e=>{ e.preventDefault(); startDrag(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e=>{ moveDrag(e.clientX,e.clientY); });
  document.addEventListener('mouseup',   ()=>{ endDrag(); });
  el.addEventListener('touchstart', e=>{ startDrag(e.touches[0].clientX, e.touches[0].clientY); },{passive:true});
  document.addEventListener('touchmove', e=>{ moveDrag(e.touches[0].clientX, e.touches[0].clientY); },{passive:true});
  document.addEventListener('touchend', ()=>{ endDrag(); });
  state.setPos = setPos;
  return state;
}

const giftEl = document.getElementById('giftWrap');
const giftState = makeDraggable(giftEl, { clampW:90, clampH:90, onTap: openGift });
(function(){ giftState.setPos(window.innerWidth/2, window.innerHeight - 200); })();

function spawnSparkles(cx,cy){
  const emojis=['✨','🎉','⭐','💫','🎊','🌟','💖','🎀'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div'); s.className='sparkle';
    s.textContent=emojis[i%emojis.length];
    const angle=Math.random()*Math.PI*2, dist1=60+Math.random()*60, dist2=120+Math.random()*80;
    s.style.cssText=`left:${cx}px;top:${cy}px;--sx:${Math.cos(angle)*dist1}px;--sy:${Math.sin(angle)*dist1}px;--sx2:${Math.cos(angle)*dist2}px;--sy2:${Math.sin(angle)*dist2}px;animation-delay:${Math.random()*.3}s;font-size:${1+Math.random()*1.2}rem;`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1200);
  }
}

let giftFirstOpened = false;
function openGift(){
  const isOpen = giftEl.classList.contains('open');
  if(isOpen){
    giftEl.classList.remove('open');
    document.getElementById('giftLabel').textContent = '🎁 Buka?';
  } else {
    giftEl.classList.add('open');
    document.getElementById('giftLabel').textContent = '🎁 Tutup?';
    if(!giftFirstOpened){
      giftFirstOpened = true;
      spawnSparkles(giftState.x, giftState.y - 40);
      setTimeout(()=>{
        const bw = document.getElementById('bookWrap');
        const targetX = window.innerWidth/2, targetY = window.innerHeight/2 - 50;

        bw.style.transition = 'none';
        bw.style.left = giftState.x+'px';
        bw.style.top  = giftState.y+'px';
        bw.style.opacity = '0';
        bw.style.transform = 'translate(-50%,-50%) scale(0.15) rotateZ(-8deg)';
        bw.classList.add('visible');
        bw.classList.add('popping');
        bookState.x = giftState.x; bookState.y = giftState.y;

        requestAnimationFrame(()=> requestAnimationFrame(()=>{
          bw.style.transition = [
            'left 1.1s cubic-bezier(.23,1,.32,1)',
            'top 1.1s cubic-bezier(.23,1,.32,1)',
            'opacity 0.35s ease-out',
            'transform 1.1s cubic-bezier(.175,.885,.32,1.275)'
          ].join(',');
          bw.style.left = targetX+'px';
          bw.style.top  = targetY+'px';
          bw.style.opacity = '1';
          bw.style.transform = 'translate(-50%,-50%) scale(1) rotateZ(0deg)';
          bookState.x = targetX; bookState.y = targetY;
        }));

        setTimeout(()=>{
          bw.style.transition = 'none';
          bw.style.transform = '';
          bw.classList.remove('popping');
          document.getElementById('hintText').textContent='✨ Baca bukunya?';
        }, 1200);
      }, 500);
    }
  }
}

const bookEl2 = document.getElementById('bookWrap');
const bookState = makeDraggable(bookEl2, { clampW:120, clampH:160, onTap:()=>{ if(document.getElementById('modal').classList.contains('open')) return; openBook(); } });
bookEl2.addEventListener('mouseup', ()=>{ bookEl2.classList.add('wobble'); setTimeout(()=>bookEl2.classList.remove('wobble'),550); });
bookEl2.addEventListener('touchend', ()=>{ bookEl2.classList.add('wobble'); setTimeout(()=>bookEl2.classList.remove('wobble'),550); });

(function(){
  const scene=document.querySelector('.scene'), book=document.getElementById('bookEl');
  const BASE_X=0, BASE_Y=0;
  let hovered=false, curX=BASE_X, curY=BASE_Y, tgtX=BASE_X, tgtY=BASE_Y, rafId=null;
  const lerp=(a,b,t)=>a+(b-a)*t;
  function tick(){ curX=lerp(curX,tgtX,.09); curY=lerp(curY,tgtY,.09); book.style.transform=`rotateX(${curX}deg) rotateY(${curY}deg) scale(1.03)`; rafId=requestAnimationFrame(tick); }
  scene.addEventListener('mouseenter',()=>{ if(bookState.active) return; if(document.getElementById('modal').classList.contains('open')) return; hovered=true; curX=BASE_X; curY=BASE_Y; book.style.animation='none'; book.style.transition='none'; cancelAnimationFrame(rafId); rafId=requestAnimationFrame(tick); });
  scene.addEventListener('mousemove',e=>{ if(!hovered||bookState.active) return; const r=scene.getBoundingClientRect(); tgtY=BASE_Y+((e.clientX-r.left-r.width/2)/(r.width/2))*24; tgtX=BASE_X-((e.clientY-r.top-r.height/2)/(r.height/2))*16; });
  scene.addEventListener('mouseleave',()=>{ hovered=false; tgtX=BASE_X; tgtY=BASE_Y; function restore(){ if(Math.abs(curX-BASE_X)<.3&&Math.abs(curY-BASE_Y)<.3){ cancelAnimationFrame(rafId); book.style.transform=''; book.style.animation=''; book.style.transition=''; } else { curX=lerp(curX,BASE_X,.08); curY=lerp(curY,BASE_Y,.08); book.style.transform=`rotateX(${curX}deg) rotateY(${curY}deg) scale(1.0)`; rafId=requestAnimationFrame(restore); } } cancelAnimationFrame(rafId); rafId=requestAnimationFrame(restore); });
})();

   r:`<span class="ch-label">📖 °❀⋆.ೃ࿔*:･°❀⋆.ೃ࿔*:･</span><h2 class="pg-heading">Sinopsis</h2><div class="pg-divider"></div><div class="pg-text"><p>Sebuah perjalanan singkat di tepi pantai. Tentang kesepian, kehilangan, dan harapan yang perlahan ditemukan kembali.</p><div class="pg-quote">"Tapi setelah matahari yang indah itu terbenam, kita jadi bisa melihat bintang-bintang yang juga sangat indah." ✨</div><p>Kisah ini mengingatkan bahwa meski setelah malam yang kelam, selalu terdapat sinar lain yang siap untuk kita perhatikan.</p></div>`},
  {ln:'3',rn:'4',
   l:`<span class="ch-label">🌅 Bab Pertama</span><h2 class="pg-heading">Mengejar Matahari</h2><div class="pg-divider"></div><div class="pg-text"><p><span class="drop">K</span>ina berlari di pesisir pantai sembari mengejar matahari yang perlahan tenggelam di ufuk barat.</p><p>Cahaya jingga yang memantul di permukaan laut membuat pemandangan itu terlihat begitu indah. Ia terpikat pada matahari yang semakin menjauh.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Hingga tak lagi memperhatikan langkah kakinya sendiri.</p><p><em>"Kina, awas jatuh, hey!"</em> teriak Keno dari kejauhan yang sejak tadi memperhatikan tingkah Kina.</p><p>Namun Kina mengabaikan peringatan itu. Ia terus berlari tanpa melihat ke bawah.</p></div>`},
  {ln:'5',rn:'6',
   l:`<span class="ch-label">🌅 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Tiba-tiba kakinya tersandung sebuah batu yang tertutup oleh pasir.</p><p><em>"Woi!"</em> teriak Keno sambil berlari menghampiri Kina yang terjatuh.</p><p>Kina meringis kesakitan. Ia menatap kakinya yang terluka, lalu air mata mulai menetes dari matanya.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Perlahan ia mengangkat pandangannya ke arah laut, menatap matahari yang kini hampir menghilang dari pandangan.</p><p><em>"Kamu gapapa kah?"</em> tanya Keno dengan nada khawatir.</p><p><em>"Itu mataharinya..."</em> jawab Kina lirih.</p></div>`},
  {ln:'7',rn:'8',
   l:`<span class="ch-label">🌅 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Keno menatap ke arah yang ditunjuk Kina dan melihat matahari yang tinggal sedikit terlihat di balik cakrawala.</p><div class="pg-quote">"Udah gapapa. Mataharinya gak bakal sembunyi lama. Nanti pasti bisa ngelihat lagi kok." 🌅</div></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p><em>"Tapi kan..."</em> ucap Kina ragu.</p><p><em>"Tapi apa? Kamu mau kejar ke mana matahari yang udah terbenam? Kamu udah jatuh sampai terluka begini,"</em> ujar Keno tegas, meski terdengar jelas kekhawatiran di suaranya.</p></div>`},
  {ln:'9',rn:'10',
   l:`<span class="ch-label">🌅 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Kina kembali menatap laut. <em>"Mataharinya indah banget. Tadi aku duduk santai ngelihatin ombak... aku belum mau momen ini berakhir,"</em> jawabnya pelan.</p><p><em>"Aku ngerti kok. Aku juga suka pemandangan ini, indah banget,"</em> kata Keno.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><div class="pg-quote">"Tapi setiap momen pasti ada awal dan akhirnya. Yang bisa kita lakukan hanyalah melanjutkan aktivitas dan menunggu hari esok." 🌊</div><p>Kina hanya terdiam, menatap laut yang mulai gelap. Ombak terdengar semakin kencang, udara malam perlahan mendingin.</p></div>`},
  {ln:'11',rn:'12',
   l:`<span class="ch-label">🌅 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Keno kemudian mengulurkan tangannya kepada Kina.</p><p><em>"Ayo sini, berdiri,"</em> ucapnya lembut.</p><div class="pg-quote">"Kalau kita tersandung dan jatuh saat berlari, kita pastinya bakal bangkit berdiri dan mengobati luka itu, kan?" 🌱</div></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p><em>"Hmmm..."</em> gumam Kina pelan. Ia menerima uluran tangan Keno dan bangkit berdiri.</p><p>Keno merangkulnya dan menuntun Kina kembali ke homestay. Di dalam, Keno membersihkan dan mengobati luka di kaki Kina dengan hati-hati.</p></div>`},
  {ln:'13',rn:'14',
   l:`<span class="ch-label">🌅 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p><em>"Makanya kalau dikasih tahu didengerin. Jangan terlalu fokus sama diri sendiri,"</em> tegur Keno.</p><p><em>"Iya... maaf,"</em> jawab Kina sambil tersenyum kecil.</p><p>Setelah luka Kina selesai diobati, mereka pun bersiap keluar untuk makan malam.</p></div>`,
   r:`<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-size:2rem;margin-bottom:12px">🌙</div><div class="pg-poem">Malam itu angin pantai<br>masih terasa sejuk —<br>hari pertama mereka,<br>penuh kejadian kecil,<br>namun tak terlupakan. 🌊</div><div class="orn">🌅 · ✨ · 🌅</div></div>`},
  {ln:'15',rn:'16',
   l:`<span class="ch-label">🌊 Bab Kedua</span><h2 class="pg-heading">Hari Kedua</h2><div class="pg-divider"></div><div class="pg-text"><p><span class="drop">K</span>eesokan harinya, Keno bangun lebih awal. Suasana homestay masih tenang, cahaya matahari baru saja menembus jendela.</p><p>Dengan hati-hati agar tidak membangunkan Kina, Keno menuliskan sebuah pesan di selembar kertas, meletakkannya di meja makan, lalu keluar.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Beberapa waktu kemudian, Kina terbangun. Ia mengucek mata dan melihat sekeliling — hanya dirinya sendiri.</p><p>Ia memeriksa setiap sudut homestay, berharap menemukan Keno. Namun tak ada tanda-tanda keberadaannya sama sekali.</p><p>Lelah mencari, Kina duduk di kursi dekat meja makan. Matanya tertuju pada selembar kertas di atasnya.</p></div>`},
  {ln:'17',rn:'18',
   l:`<span class="ch-label">🌊 · · ·</span><div class="pg-divider"></div><div class="pg-text"><div class="pg-quote">"Haii! Kalau kamu baca ini, pasti kamu udah bangun dan nyariin aku. Maaf ya, kamu tidurnya enak banget soalnya. Aku keluar bentar ngambil barang yang ketinggalan. Bakal balik cepat kok. Tunggu aku, ya!" 💌</div></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Setelah membaca surat itu, Kina hanya terdiam. Ada rasa sedih karena harus sendirian. Meski begitu, ia mencoba berpikir positif.</p><p>Ia merapikan kasur, membersihkan diri, lalu memasak sarapan sederhana. Tak lupa ia menambahkan abon kesukaannya di atas nasi hangat.</p></div>`},
  {ln:'19',rn:'20',
   l:`<span class="ch-label">🌊 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Ketika hari mulai beranjak sore, Kina memutuskan berjalan di pesisir pantai. Ia membawa kamera, merekam hamparan laut, suara ombak, dan cahaya senja.</p><p><em>"Andai momen ini ada untuk selamanya, betapa bahagianya diri ini,"</em> gumamnya dalam hati.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Namun semakin sore, langit pun semakin gelap. Perasaan sedih perlahan kembali datang — bukan hanya karena pemandangan itu akan berakhir, tetapi juga karena rasa sepi yang semakin kuat.</p><p>Kina kembali ke pantai setelah meletakkan kameranya. Ujung kakinya menyentuh air laut yang sejuk. Ia duduk di pasir, membiarkan ombak kecil menghantam kakinya.</p></div>`},
  {ln:'21',rn:'22',
   l:`<span class="ch-label">🌊 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Ia menatap jauh ke arah laut, tenggelam dalam pikirannya sendiri.</p><div class="pg-quote">"Kenapa dunia ini tak selalu indah? Mengapa hal-hal indah itu tidak selamanya menetap?" gumamnya lirih.</div><p>Tanpa ia sadari, tubuhnya perlahan terseret arus ombak yang semakin kuat.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Di saat bersamaan, Keno tiba di pantai. Dari kejauhan ia melihat sosok Kina di tengah ombak. Seketika ia menyadari sesuatu yang tidak beres.</p><p>Tanpa berpikir panjang, ia menjatuhkan semua barang bawaannya dan berlari sekuat tenaga.</p><p><em>"KINAAAA!!!"</em> teriaknya keras.</p><p>Namun Kina yang tenggelam dalam pikiran sama sekali tidak merespons.</p></div>`},
  {ln:'23',rn:'24',
   l:`<span class="ch-label">🌊 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Dengan napas terengah-engah, Keno berhasil mencapai Kina. Ia menarik tangannya di tengah derai ombak yang mulai ganas, berusaha membawa Kina kembali ke daratan.</p><p>Ombak terus menghantam, langkah mereka terasa berat. Namun Keno tidak menyerah.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Begitu sampai di pasir yang kering, Kina seketika tersadar. Ia langsung menangis — semua emosi yang selama ini ditahan tumpah begitu saja.</p><p><em>"Gapapa apanya? Kamu ke mana aja? Aku kesepian… sendirian di sini,"</em> jawab Kina dengan suara bergetar.</p></div>`},
  {ln:'25',rn:'26',
   l:`<span class="ch-label">🌊 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p><em>"Maaf banget ya… aku tadi buru-buru karena ada barang penting yang tertinggal,"</em> jelas Keno menyesal.</p><p>Kina hanya terdiam. Air matanya masih mengalir.</p><p>Keno perlahan mengusap air mata Kina.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><div class="pg-quote">"Udah, jangan nangis lagi. Aku di sini sekarang. Ayo kita rapi-rapi dulu." 🤍</div><p><em>"Hm… kamu jangan pergi lagi, ya…"</em> kata Kina pelan.</p><p><em>"Iya, iya, Kina,"</em> jawab Keno menenangkan.</p></div>`},
  {ln:'27',rn:'28',
   l:`<span class="ch-label">🌊 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Malam itu mereka kembali ke homestay bersama.</p><div class="pg-poem">Hari kedua terasa berat —<br>namun Keno datang tepat waktu,<br>menyelamatkan Kina<br>sebelum keadaan menjadi<br>semakin buruk. 🌊</div><div class="orn">🌊 · 🤍 · 🌊</div></div>`,
   r:`<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-size:2.2rem;margin-bottom:16px">🤍</div><div style="width:50px;height:3px;background:linear-gradient(90deg,#ff6eb4,#c9a8ff);border-radius:3px;margin:0 auto 20px"></div><div style="font-family:'Nunito',sans-serif;font-size:.78rem;color:rgba(160,80,120,.55);line-height:1.8;padding:0 20px;font-style:italic">"Kehadiran seseorang diukur bukan dari lamanya ia ada — tapi dari tepatnya ia datang saat kamu butuhkan." 🌊</div></div>`},
  {ln:'29',rn:'30',
   l:`<span class="ch-label">🌟 Bab Ketiga</span><h2 class="pg-heading">Di Bawah Bintang</h2><div class="pg-divider"></div><div class="pg-text"><p><span class="drop">T</span>engah malam itu, suasana pantai begitu tenang. Hanya terdengar suara ombak yang bergulung pelan dan hembusan angin laut yang sejuk.</p><p>Di saat itulah Keno mengajak Kina keluar dari homestay.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p><em>"Kina, ayo keluar sebentar,"</em> ajak Keno.</p><p>Kina yang masih terjaga mengangguk pelan. <em>"Hmm… oke."</em></p><p>Mereka berjalan menuju pesisir pantai yang gelap namun damai. Keno mengeluarkan sebuah tikar dari tasnya dan membentangkannya di atas pasir.</p><p><em>"Ayo sini,"</em> ujar Keno sambil menepuk tikar itu.</p></div>`},
  {ln:'31',rn:'32',
   l:`<span class="ch-label">🌟 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Tak lama kemudian, mereka berdua membaringkan tubuh di atas tikar. Pandangan mereka tertuju ke langit malam yang luas, dipenuhi taburan bintang yang berkilauan.</p><p><em>"Menurut kamu, lebih indah matahari terbenam itu, atau bintang-bintang yang kita lihat sekarang?"</em> tanya Keno tiba-tiba.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Kina memandangi langit beberapa saat, seolah benar-benar memikirkan pertanyaan itu.</p><p><em>"Kalau dipikir-pikir lagi… bintang-bintang juga indah buat dilihat. Apalagi di malam seperti ini,"</em> jawabnya pelan.</p><p>Keno hanya tersenyum kecil sebelum kembali menatap langit. Suara ombak dan angin malam membuat suasana terasa begitu nyaman.</p></div>`},
  {ln:'33',rn:'34',
   l:`<span class="ch-label">🌟 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p><em>"Kina… gimana yang kamu rasa setelah sore tadi?"</em> tanya Keno hati-hati.</p><p>Kina terdiam sejenak.</p><p><em>"Awalnya aku puas keliling pantai sendirian. Tapi lama-lama aku mulai ngerasa kesepian… betapa beratnya hidup kalau harus sendirian. Dan kenapa hal-hal indah itu nggak pernah menetap selamanya?"</em> jawab Kina lirih.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Keno menghela napas pelan.</p><p><em>"Sekali lagi aku minta maaf, ya. Mulai sekarang aku bakal lebih terbuka dan nggak bakal ninggalin kamu begitu aja,"</em> ucapnya tulus.</p><p>Kina tersenyum kecil. <em>"Iya… udah, jangan terlalu diungkit lagi."</em></p><p>Keno terkekeh. <em>"Hehe… berarti kamu udah tahu jawabannya dong?"</em></p><p><em>"Jawaban apa?"</em> tanya Kina bingung.</p></div>`},
  {ln:'35',rn:'36',
   l:`<span class="ch-label">🌟 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p><em>"Mataharinya memang indah banget. Tapi sayang, setelah terbenam kita nggak bisa lihat lagi,"</em> ujar Keno.</p><p><em>"Iya…"</em> jawab Kina pelan.</p><div class="pg-quote">"Tapi setelah matahari yang indah itu terbenam, kita jadi bisa melihat bintang-bintang yang juga sangat indah. Bahkan… lebih menenangkan." 🌟</div></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Kina hanya tersenyum. Dalam hatinya ia mengerti maksud Keno. Ia kembali menatap langit yang dipenuhi bintang, lalu perlahan memejamkan matanya.</p><p>Melihat Kina tertidur, Keno mengambil selimut dan menyelimutinya dengan hati-hati. Ia lalu duduk, mengeluarkan buku catatan, dan mulai mengerjakan jurnalnya di bawah cahaya bintang.</p></div>`},
  {ln:'37',rn:'38',
   l:`<span class="ch-label">🌟 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Malam itu pun berlalu dengan tenang — di bawah lautan bintang, ditemani derai ombak laut yang seolah tak pernah berhenti.</p><div class="pg-poem">Setelah matahari terbenam,<br>bintang-bintang pun muncul —<br>lebih tenang, lebih dalam,<br>menerangi mereka yang mau<br>menunggu dalam gelap. 🌟</div></div>`,
   r:`<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-size:2.2rem;margin-bottom:16px">🌌</div><div style="width:50px;height:3px;background:linear-gradient(90deg,#c9a8ff,#62d4ff);border-radius:3px;margin:0 auto 20px"></div><div style="font-family:'Nunito',sans-serif;font-size:.78rem;color:rgba(160,80,120,.5);line-height:1.9;padding:0 20px;font-style:italic">"Di bawah langit yang sama,<br>kita tidak pernah benar-benar<br>sendirian." ✨</div></div>`},
  {ln:'39',rn:'40',
   l:`<span class="ch-label">🎂 Bab Keempat</span><h2 class="pg-heading">Hari Ketiga</h2><div class="pg-divider"></div><div class="pg-text"><p><span class="drop">P</span>agi hari pun tiba. Kina terbangun lebih dulu, merasakan angin laut yang masih sejuk. Ia menoleh dan melihat Keno masih tertidur lelap di atas tikar.</p><p>Kina tersenyum kecil, lalu menepuk bahu Keno pelan.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p><em>"Ken, bangun… udah pagi. Kamu mau tersapu ombak? Terus hilang, ninggalin aku lagi?"</em> tanya Kina sambil tertawa kecil.</p><p>Keno yang masih setengah sadar mengerjap pelan. <em>"Iya, iya… aku bangun ini,"</em> jawabnya dengan suara serak.</p><p>Setelah keduanya terbangun, mereka merapikan tikar dan membawa semua barang kembali ke homestay.</p></div>`},
  {ln:'41',rn:'42',
   l:`<span class="ch-label">🎂 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Sesampainya di sana, Keno membersihkan diri terlebih dahulu, lalu bergantian dengan Kina. Sambil menunggu, Keno menyiapkan sarapan di dapur kecil homestay.</p><p>Aroma makanan hangat memenuhi ruangan. Tak lama, mereka duduk bersama menikmati sarapan.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Siang harinya, mereka kembali menyusuri pantai — kali ini jauh lebih ceria. Mereka berfoto, saling merekam tingkah lucu satu sama lain, bahkan menerbangkan layangan di tepi pantai.</p><p>Tawa mereka bercampur dengan suara ombak dan angin laut. Hari itu terasa begitu ringan. 🪁</p></div>`},
  {ln:'43',rn:'44',
   l:`<span class="ch-label">🎂 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Ketika malam tiba, mereka duduk berdua di meja makan untuk menikmati makan malam.</p><p><em>"Kina, tutup mata gih,"</em> ucap Keno tiba-tiba.</p><p><em>"Kenapa nih?"</em> tanya Kina heran.</p><p><em>"Udah, tutup aja."</em></p><p><em>"Iya deh…"</em> kata Kina sambil memejamkan mata.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Saat Kina menutup mata, Keno mengeluarkan sebuah kue ulang tahun yang telah ia siapkan sejak hari kedua saat ia sempat pergi. Dengan cepat ia menatanya di meja makan dan menambahkan hiasan kecil di sekitarnya. 🎂</p><p><em>"Kina, tetap tutup mata sampai aku suruh buka ya?"</em></p><p><em>"Iya, Keno."</em></p></div>`},
  {ln:'45',rn:'46',
   l:`<span class="ch-label">🎂 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Keno duduk kembali di hadapan Kina.</p><p><em>"Tiga hari ini… apa yang kamu rasa?"</em> tanya Keno pelan.</p><p><em>"Hmm… aku ngerasa sedikit lebih baik. Bisa lepas dari tekanan yang biasanya bikin aku overthink, stres…"</em> jawab Kina pelan, matanya masih terpejam.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p><em>"Semakin hari pasti semakin berat ya hidup ini?"</em></p><p><em>"Hm… iya."</em></p><p><em>"Kamu pasti benar-benar lelah."</em></p><p>Kina hanya mengangguk kecil. <em>"Hmm…"</em></p><p>Keno tersenyum lembut.</p><p><em>"Tapi aku kagum. Kamu bisa sampai sejauh ini. Kamu masih bertahan… kamu masih ada sampai saat ini, di hadapanku."</em></p></div>`},
  {ln:'47',rn:'48',
   l:`<span class="ch-label">🎂 · · ·</span><div class="pg-divider"></div><div class="pg-text"><div class="pg-quote">"Kamu benar-benar kuat. Dari banyaknya pikiran untuk menyerah… ternyata kamu masih ada sampai sekarang. Aku benar-benar kagum." 💛</div><p>Suasana menjadi hening sejenak.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p><em>"Sudah selama ini kamu bertahan… dan hari ini resmi menjadi yang ke delapan belas tahun."</em></p><p><em>"Kamu bertahan sejauh ini. Aku bangga,"</em> tambah Keno.</p><p>Di balik kelopak matanya yang tertutup, Kina perlahan tersenyum.</p><p><em>"Sekarang… buka mata kamu, Kina."</em></p></div>`},
  {ln:'49',rn:'50',
   l:`<span class="ch-label">🎂 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Kina perlahan membuka matanya.</p><p>Di hadapannya, sebuah kue ulang tahun tersusun rapi di atas meja, dihiasi dekorasi kecil. Cahaya lilin yang menyala membuat suasana terasa hangat. 🕯️</p><p>Kina terdiam sejenak, lalu tersenyum — kali ini lebih lebar.</p></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p><em>"Selamat ulang tahun yang ke delapan belas, Kina!"</em> ucap Keno penuh semangat.</p><div class="pg-quote">"Kamu layak untuk segala hal baik. Terima kasih karena kamu sudah bertahan sampai sejauh ini. Aku percaya kamu pasti bisa melewatinya." 🎂</div></div>`},
  {ln:'51',rn:'52',
   l:`<span class="ch-label">🎂 · · ·</span><div class="pg-divider"></div><div class="pg-text"><div class="pg-quote">"Dikala dunia terasa membenci dan tidak menginginkan kamu, percayalah… akan selalu ada sesuatu dan seseorang yang mendukung kamu. Kamu tidak pernah benar-benar sendirian." 🤍</div></div>`,
   r:`<div class="pg-text" style="margin-top:1rem"><p>Keno berdiri dan menghampiri Kina. Ia memberikan pelukan hangat.</p><p><em>"Janji ya… kamu akan terus berjuang dan tidak akan pernah menyerah?"</em></p><p>Kina membalas pelukan itu pelan.</p><p><em>"Hmm… iya. Aku akan usahakan itu."</em></p><p>Malam itu terasa begitu hangat. 🌙</p></div>`},
  {ln:'53',rn:'54',
   l:`<span class="ch-label">🎂 · · ·</span><div class="pg-divider"></div><div class="pg-text"><p>Dan begitulah hari ketiga mereka — hari untuk merenung, merefleksikan perjalanan hidup, dan merayakan hal yang paling berharga: kehidupan serta kehadiran.</p><p>Keesokan harinya, Kina dan Keno kembali ke kota, membawa kenangan dari tiga hari di pantai itu. 🏡</p></div>`,
   r:`<div class="pg-poem">Kenangan yang mungkin sederhana,<br>tetapi cukup untuk mengingatkan —<br>bahwa bahkan di tengah<br>gelapnya malam,<br>selalu ada bintang yang bersinar. 🌟</div><div class="orn">🎂 · 🤍 · 🌟</div>`},
  {ln:'55',rn:'56',
   l:`<span class="ch-label">📄 Jurnal Keno</span><h2 class="pg-heading">Dari Balik Halaman</h2><div class="pg-divider"></div><div class="pg-text"><p style="font-family:'Bubblegum Sans',cursive;font-size:.95rem;color:#c05080;line-height:1.9;text-align:center;margin-top:8px">Penasaran gak sama jurnal yang dibuat oleh Keno?<br>Nih aku tunjukkin,<br>kamu harus baca yaa!! 📖✨</p></div>`,
   r:`<div style="height:100%;display:flex;flex-direction:column;gap:8px;padding:8px"><div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px"><a href="jurnal_keno.pdf" download style="background:linear-gradient(135deg,#ff6eb4,#c9a8ff);color:#fff;font-family:'Fredoka One',cursive;font-size:.72rem;padding:5px 14px;border-radius:16px;text-decoration:none;box-shadow:0 3px 8px rgba(255,110,180,.4);white-space:nowrap">📥 Unduh</a><button onclick="openPdfOverlay()" style="background:linear-gradient(135deg,#c9a8ff,#62d4ff);color:#fff;border:none;font-family:'Fredoka One',cursive;font-size:.72rem;padding:5px 14px;border-radius:16px;cursor:pointer;box-shadow:0 3px 8px rgba(100,200,255,.4);white-space:nowrap">🔍 Fullscreen</button></div><div style="flex:1;min-height:0;overflow:hidden;border-radius:8px;box-shadow:0 2px 12px rgba(200,100,180,.2)"><object data="jurnal_keno.pdf" type="application/pdf" style="width:100%;height:100%;border:none;display:block"><p style="padding:12px;font-family:Nunito,sans-serif;font-size:.8rem;color:#c05080;text-align:center">PDF tidak dapat ditampilkan.<br><a href="jurnal_keno.pdf" target="_blank">Klik di sini untuk membuka.</a></p></object></div></div>`},

let cur=0;
function render(){
  const s=spreads[cur];
  ['l','r'].forEach(side=>{
    const el=document.getElementById(side+'Content');
    el.innerHTML=s[side];
    el.classList.remove('page-content');
    void el.offsetWidth;
    el.classList.add('page-content');
  });
  document.getElementById('lNum').textContent=s.ln;
  document.getElementById('rNum').textContent=s.rn;
  document.getElementById('btnPrev').disabled=cur===0;
  document.getElementById('btnNext').disabled=cur===spreads.length-1;
  document.querySelectorAll('.pip').forEach((p,i)=>p.classList.toggle('active',i===cur));

}
function openBook(){
  const pc=document.getElementById('pips');
  if(!pc.children.length){ spreads.forEach((_,i)=>{ const d=document.createElement('div'); d.className='pip'+(i===0?' active':''); d.onclick=()=>{cur=i;render();}; pc.appendChild(d); }); }
  render(); document.getElementById('modal').classList.add('open');
}
function closeBook(){ document.getElementById('modal').classList.remove('open'); }

(function(){
  const SNAP_DIST = 90; 

  function getCenter(el){
    return { x: parseFloat(el.style.left)||0, y: parseFloat(el.style.top)||0 };
  }

  function dist(a, b){
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  function bookIntoBox(){
    const gift = getCenter(giftEl);
    const book = getCenter(bookEl2);
    if(dist(gift, book) < SNAP_DIST){
      bookEl2.classList.add('popping');
      bookEl2.style.transition = [
        'left .55s cubic-bezier(.4,0,.6,1)',
        'top .55s cubic-bezier(.4,0,.6,1)',
        'opacity .4s ease-in',
        'transform .55s cubic-bezier(.4,0,.6,1)'
      ].join(',');
      bookEl2.style.left  = gift.x + 'px';
      bookEl2.style.top   = (gift.y - 20) + 'px';
      bookEl2.style.opacity = '0';
      bookEl2.style.transform = 'translate(-50%,-50%) scale(0.12) rotateZ(8deg)';

      setTimeout(()=>{
        giftEl.classList.remove('open');
        document.getElementById('giftLabel').textContent = '🎁 Buka?';
      }, 280);

      spawnSparkles(gift.x, gift.y - 40);

      setTimeout(()=>{
        bookEl2.classList.remove('visible','popping');
        bookEl2.style.transition = 'none';
        bookEl2.style.transform  = '';
        bookEl2.style.opacity    = '1';
        giftFirstOpened = false;
        document.getElementById('hintText').textContent = '🎁 Klik kotaknya?';
      }, 650);
    }
  }

  document.addEventListener('mouseup',  ()=>{ if(bookEl2.classList.contains('visible')) bookIntoBox(); });
  document.addEventListener('touchend', ()=>{ if(bookEl2.classList.contains('visible')) bookIntoBox(); });
})();
function nextPage(){ if(cur<spreads.length-1){cur++;render();} }
function prevPage(){ if(cur>0){cur--;render();} }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) closeBook(); });
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight') nextPage(); if(e.key==='ArrowLeft') prevPage(); if(e.key==='Escape') closeBook(); });
let tx=0;
document.getElementById('modal').addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.getElementById('modal').addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50){dx<0?nextPage():prevPage();} },{passive:true});

(function(){
  const c=document.getElementById('particles');
  const colors=['#ff6eb4','#ffe066','#5ee7c0','#62d4ff','#c9a8ff','#ff9a5c','#ff5e7a','#fff'];
  const shapes=['50%','4px','2px'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div'); p.className='particle';
    const size=Math.random()*8+4, color=colors[Math.floor(Math.random()*colors.length)], shape=shapes[Math.floor(Math.random()*shapes.length)], isRect=shape!=='50%';
    p.style.cssText=[`width:${isRect?size*2.8:size}px`,`height:${isRect?size*0.8:size}px`,`background:${color}`,`border-radius:${shape}`,`left:${Math.random()*105}vw`,`top:${Math.random()*-20}vh`,`--dx:${(Math.random()-.5)*180}px`,`--rot:${Math.random()*720}deg`,`animation-duration:${Math.random()*5+5}s`,`animation-delay:${Math.random()*7}s`,`opacity:${Math.random()*.7+.3}`,`box-shadow:0 0 4px ${color}`].join(';');
    c.appendChild(p);
  }
  const balloonEmoji=['🎈','🎈','🎉','🎊','🎁','🌈','⭐'];
  for(let i=0;i<10;i++){
    const b=document.createElement('div'); b.className='balloon';
    b.textContent=balloonEmoji[Math.floor(Math.random()*balloonEmoji.length)];
    const sz=Math.random()*18+20;
    b.style.cssText=[`left:${Math.random()*95}vw`,`--bsize:${sz}px`,`--sway:${(Math.random()-.5)*90}px`,`animation-duration:${Math.random()*10+10}s`,`animation-delay:${Math.random()*14}s`].join(';');
    document.body.appendChild(b);
  }
  const bw=document.createElement('div'); bw.className='bunting-wrap';
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('class','bunting-svg'); svg.setAttribute('preserveAspectRatio','none');
  const W=window.innerWidth||1200; svg.setAttribute('viewBox',`0 0 ${W} 60`);
  const bColors=['#ff5e7a','#ffe066','#5ee7c0','#62d4ff','#c9a8ff','#ff9a5c','#ff6eb4'];
  const spacing=44, count=Math.ceil(W/spacing)+2;
  const line=document.createElementNS(ns,'path'); let d=`M0,8 `;
  for(let i=0;i<count;i++){const x=i*spacing;d+=`Q${x+spacing/2},36 ${x+spacing},8 `;}
  line.setAttribute('d',d); line.setAttribute('fill','none'); line.setAttribute('stroke','rgba(255,110,180,0.4)'); line.setAttribute('stroke-width','1.8');
  svg.appendChild(line);
  for(let i=0;i<count;i++){
    const x=i*spacing,cx=x+spacing/2;
    const tri=document.createElementNS(ns,'polygon');
    tri.setAttribute('points',`${cx-10},10 ${cx+10},10 ${cx},34`);
    tri.setAttribute('fill',bColors[i%bColors.length]); tri.setAttribute('opacity','0.9');
    svg.appendChild(tri);
  }
  bw.appendChild(svg); document.body.appendChild(bw);
  const starEmojis=['⭐','✨','💫','🌟','🌸','🌺','💖','🎀'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div'); s.className='float-star';
    s.textContent=starEmojis[Math.floor(Math.random()*starEmojis.length)];
    const sz=Math.random()*18+14;
    s.style.cssText=[`left:${Math.random()*95}vw`,`top:${Math.random()*85}vh`,`--sz:${sz}px`,`--dur:${Math.random()*4+3}s`,`animation-delay:${Math.random()*5}s`].join(';');
    document.body.appendChild(s);
  }
})();
</script>
